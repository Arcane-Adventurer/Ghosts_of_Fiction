<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>جستجو — کتابخانه آزاد افغانستان</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <script>var relativePath = '../';</script>
  <script src="../js/app.js"></script>
  <script src="../js/components.js"></script>
</head>
<body>

<div id="navbar-root"></div>

<div style="background:var(--lapis-dk);padding:2rem 0">
  <div class="container">
    <div class="breadcrumb" style="color:rgba(255,255,255,.5)">
      <a href="../index.html" style="color:rgba(255,255,255,.5)">خانه</a>
      <span class="sep">›</span>
      <span style="color:#fff">جستجو</span>
    </div>
    <h1 style="color:#fff;margin:.5rem 0 1rem">نتایج جستجو</h1>
    <form class="hero__search" data-search-form style="max-width:560px;margin:0">
      <input type="search" id="search-input" placeholder="جستجوی کتاب، نویسنده..."/>
      <button type="submit">🔍</button>
    </form>
  </div>
</div>

<section class="section">
  <div class="container">
    <div id="search-summary" style="margin-bottom:1.5rem;color:var(--muted);font-size:.9rem"></div>
    <div class="cat-tabs" id="filter-tabs">
      <button class="cat-tab active" onclick="filterResults('all',this)">همه نتایج</button>
      <button class="cat-tab" onclick="filterResults('school',this)">📘 مکتب</button>
      <button class="cat-tab" onclick="filterResults('university',this)">🎓 پوهنتون</button>
      <button class="cat-tab" onclick="filterResults('history',this)">🏛️ تاریخ</button>
      <button class="cat-tab" onclick="filterResults('philosophy',this)">🧠 فلسفه</button>
    </div>
    <div id="results-container"></div>
  </div>
</section>

<div id="footer-root"></div>
<div id="auth-modal-root"></div>

<script>
document.getElementById('navbar-root').innerHTML     = renderNavbar('');
document.getElementById('footer-root').innerHTML     = renderFooter();
document.getElementById('auth-modal-root').innerHTML = renderAuthModal();

var allResults = [];
var query = new URLSearchParams(window.location.search).get('q') || '';

document.getElementById('search-input').value = query;
document.title = (query ? 'جستجو: ' + query + ' — ' : '') + 'کتابخانه آزاد افغانستان';

if (!query) {
  document.getElementById('search-summary').textContent = 'لطفاً عبارتی را جستجو کنید.';
  document.getElementById('results-container').innerHTML =
    '<div class="loading-overlay"><span style="font-size:2rem">🔍</span><span>جستجوی خود را وارد کنید</span></div>';
} else {
  doSearch();
}

function doSearch() {
  var q = query.toLowerCase();
  allResults = FALLBACK_BOOKS.filter(function(b){
    return (b.title_dari||'').includes(q) || (b.author||'').includes(q) || (b.title_en||'').toLowerCase().includes(q);
  });
  renderResults(allResults);
}

function renderResults(results) {
  var summary = document.getElementById('search-summary');
  summary.innerHTML = results.length
    ? '🔍 <strong>' + UI.formatNum(results.length) + '</strong> نتیجه برای «<strong>' + query + '</strong>»'
    : 'هیچ نتیجه‌ای برای «<strong>' + query + '</strong>» یافت نشد';

  var container = document.getElementById('results-container');
  if (!results.length) {
    container.innerHTML = '<div class="loading-overlay" style="min-height:280px"><span style="font-size:3rem">📭</span><span>نتیجه‌ای یافت نشد</span><a href="books.html" class="btn btn-outline btn-sm">مشاهده همه کتاب‌ها</a></div>';
    return;
  }
  container.innerHTML = results.map(function(b){
    var cat = CATEGORIES[b.category] || {};
    var hl  = (b.title_dari||'').replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), function(m){ return '<mark>' + m + '</mark>'; });
    var archiveSafe = (b.archive_url||'').replace(/'/g,'');
    return '<div class="search-result-item" onclick="openBook(\''+b.id+'\')">' +
      '<div class="search-result-icon" style="background:'+(b.cover_color||cat.color||'#EEF')+'"><span style="font-size:1.8rem">'+(b.cover_emoji||cat.icon||'📖')+'</span></div>' +
      '<div class="search-result-body">' +
        '<div class="search-result-title">'+hl+'</div>' +
        (b.title_en ? '<div style="font-size:.78rem;color:var(--muted);direction:ltr;font-family:sans-serif">'+b.title_en+'</div>' : '') +
        '<div class="search-result-meta" style="margin-top:.3rem">'+(b.author||'')+(b.grade?' · صنف '+UI.formatNum(b.grade):'')+(b.year?' · '+b.year:'')+'</div>' +
        '<div style="margin-top:.4rem">'+UI.badgeFor(b.category)+'</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:.4rem;flex-shrink:0">' +
        '<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openBook(\''+b.id+'\')">📖 خواندن</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();downloadBook(\''+b.id+'\',\''+archiveSafe+'\')">⬇️ دانلود</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function filterResults(cat, el) {
  document.querySelectorAll('#filter-tabs .cat-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  var filtered = cat === 'all' ? allResults : allResults.filter(function(b){ return b.category === cat; });
  renderResults(filtered);
}
</script>
</body>
</html>
